<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Lamplighter · Social Preview</title>
  <link rel="stylesheet" href="fonts/lamplighter.css">
  <link rel="stylesheet" href="fonts/huiwen.css">
  <style>
    :root {
      --paper: #d8d3c7;
      --ink: #1e211d;
      --faded: #4f5047;
      --red: #762f32;
      --rule: #777469;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 1280px;
      height: 640px;
      margin: 0;
      overflow: hidden;
      background: var(--paper);
    }

    body {
      color: var(--ink);
      text-rendering: geometricPrecision;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      position: relative;
      width: 1280px;
      height: 640px;
      overflow: hidden;
      background: var(--paper) url("social-preview-bg.png") center / cover no-repeat;
      box-shadow:
        inset 0 0 0 12px rgba(30, 33, 29, .08),
        inset 0 0 0 15px rgba(30, 33, 29, .54),
        inset 0 0 0 19px rgba(216, 211, 199, .72),
        inset 0 0 0 20px rgba(30, 33, 29, .45);
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: .22;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(30, 33, 29, .32) 0 1px, transparent 1.5px),
        radial-gradient(circle at 70% 60%, rgba(30, 33, 29, .18) 0 1px, transparent 1.5px);
      background-size: 5px 5px, 7px 7px;
      mix-blend-mode: multiply;
    }

    .edition {
      position: absolute;
      z-index: 2;
      top: 45px;
      left: 58px;
      display: flex;
      align-items: center;
      gap: 16px;
      font: 700 14px/1.1 "Courier New", monospace;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--faded);
    }

    .edition::before {
      content: "";
      width: 50px;
      height: 8px;
      border-top: 2px solid var(--red);
      border-bottom: 1px solid var(--red);
    }

    .copy {
      position: absolute;
      z-index: 2;
      top: 126px;
      left: 58px;
      width: 785px;
    }

    .masthead {
      margin: 0;
      white-space: nowrap;
      font-family: "Lamplighter Display", Georgia, serif;
      font-size: 74px;
      font-weight: 800;
      line-height: .9;
      color: var(--ink);
      text-shadow: 2px 1px 0 rgba(118, 47, 50, .32);
    }

    .rule {
      width: 720px;
      margin: 22px 0 18px;
      border-top: 4px solid var(--ink);
      border-bottom: 1px solid var(--ink);
      height: 9px;
    }

    .cn {
      margin: 0 0 10px;
      font-family: "Huiwen-mincho", "Songti SC", serif;
      font-size: 34px;
      font-weight: 700;
      line-height: 1.1;
      color: var(--ink);
    }

    .deck {
      margin: 0;
      max-width: 660px;
      font: italic 25px/1.35 Georgia, serif;
      color: var(--faded);
    }

    .stamp {
      position: absolute;
      z-index: 2;
      left: 58px;
      bottom: 56px;
      display: inline-flex;
      align-items: stretch;
      border: 2px solid var(--red);
      color: var(--red);
      transform: rotate(-1deg);
    }

    .stamp strong,
    .stamp span {
      padding: 9px 13px 8px;
      font: 700 13px/1 "Courier New", monospace;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .stamp strong {
      color: var(--paper);
      background: var(--red);
    }

    .stamp span + span { border-left: 1px solid var(--red); }

    .colophon {
      position: absolute;
      z-index: 2;
      right: 54px;
      bottom: 38px;
      font: 700 11px/1 "Courier New", monospace;
      letter-spacing: .2em;
      color: rgba(216, 211, 199, .82);
      text-transform: uppercase;
      text-shadow: 1px 1px 0 rgba(30, 33, 29, .75);
    }
  </style>
</head>
<body>
  <main class="card" aria-label="The Lamplighter GitHub social preview">
    <div class="edition">Old London Editorial Noir · Est. MMXXVI</div>
    <section class="copy">
      <h1 class="masthead">THE LAMPLIGHTER</h1>
      <div class="rule"></div>
      <p class="cn">点灯人 · 报纸图片生成器</p>
      <p class="deck">Write the story. Set the type. Send it to press.</p>
    </section>
    <div class="stamp">
      <strong>Open Source</strong>
      <span>Live Type</span>
      <span>CJK Ready</span>
      <span>PNG Export</span>
    </div>
    <div class="colophon">London · One Penny</div>
  </main>
</body>
</html>
